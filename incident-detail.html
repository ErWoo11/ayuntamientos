<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Detalle de alerta - Alertas Municipales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #fafafa;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --accent: #f59e0b;
      --badge-parking: #fef2f2;
      --badge-parking-text: #be123c;
      --badge-event: #ecfdf5;
      --badge-event-text: #059669;
      --badge-utility: #eff6ff;
      --badge-utility-text: #1d4ed8;
      --badge-roadwork: #fffbeb;
      --badge-roadwork-text: #b45309;
      --badge-closure: #fef2f2;
      --badge-closure-text: #dc2626;
      --badge-other: #f3f4f6;
      --badge-other-text: #374151;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; }

    /* Top Nav */
    .top-nav { background: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 0.75rem; font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--text); }
    .logo i { background: var(--text); color: #fff; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    .nav-subtitle { color: var(--text-muted); font-size: 0.85rem; }

    /* Breadcrumb */
    .breadcrumb { max-width: 800px; margin: 1.5rem auto 0; padding: 0 2rem; font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb .separator { color: var(--text-light); }
    .breadcrumb .current { color: var(--text); font-weight: 500; }

    /* Main Content */
    .container { max-width: 800px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    /* Detail Card */
    .detail-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 2rem; position: relative; margin-bottom: 1.5rem; }
    .detail-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent); border-radius: 12px 12px 0 0; }

    /* Badges */
    .badges-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .category-badge { padding: 0.4rem 0.85rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; border: none; }
    .category-badge i { font-size: 0.7rem; }
    .category-badge.parking_ban { background: var(--badge-parking); color: var(--badge-parking-text); }
    .category-badge.event { background: var(--badge-event); color: var(--badge-event-text); }
    .category-badge.utility_cut { background: var(--badge-utility); color: var(--badge-utility-text); }
    .category-badge.roadwork { background: var(--badge-roadwork); color: var(--badge-roadwork-text); }
    .category-badge.street_closure { background: var(--badge-closure); color: var(--badge-closure-text); }
    .category-badge.other { background: var(--badge-other); color: var(--badge-other-text); }
    .status-badge { padding: 0.4rem 0.85rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; background: #fffbeb; color: #b45309; }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* Title */
    .detail-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
    .detail-muni { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1.25rem; }
    .detail-muni i { font-size: 0.8rem; }
    .detail-description { font-size: 1rem; color: #374151; line-height: 1.7; margin-bottom: 1.5rem; }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .info-block { background: #fafafa; border-radius: 10px; padding: 1.25rem; border: 1px solid var(--border); }
    .info-block-title { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .info-row { display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .info-row:last-child { margin-bottom: 0; }
    .info-row i { color: var(--text-light); font-size: 0.85rem; width: 18px; text-align: center; }
    .info-row strong { font-weight: 600; }
    .info-row a { color: var(--accent); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem; }
    .info-row a:hover { text-decoration: underline; }

    /* Affected Streets */
    .streets-section { margin-bottom: 1.5rem; }
    .streets-title { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .streets-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .street-tag { background: #f3f4f6; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.85rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
    .street-tag i { color: var(--text-light); font-size: 0.75rem; }

    /* Published Date */
    .published-date { font-size: 0.8rem; color: var(--text-light); padding-top: 1rem; border-top: 1px solid var(--border); }

    /* Map Card */
    .map-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .map-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.95rem; }
    .map-header i { color: var(--text-muted); }
    .map-container { width: 100%; height: 350px; border: none; }

    /* Loading */
    .loading-detail { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .loading-detail i { font-size: 2rem; margin-bottom: 1rem; display: block; }
    .error-detail { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .error-detail i { font-size: 2rem; margin-bottom: 1rem; display: block; color: #ef4444; }
    .error-detail a { color: var(--accent); text-decoration: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav { padding: 1rem; }
      .breadcrumb { padding: 0 1rem; margin-top: 1rem; }
      .container { padding: 1rem 1rem 2rem; }
      .detail-card { padding: 1.5rem; }
      .info-grid { grid-template-columns: 1fr; }
      .detail-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="index.html" class="logo">
      <i class="fas fa-bell"></i>
      <span>Alertas Municipales</span>
    </a>
    <span class="nav-subtitle">Información municipal centralizada</span>
  </nav>

  <!-- Breadcrumb -->
  <nav class="breadcrumb" id="breadcrumb">
    <a href="index.html">Inicio</a>
    <span class="separator">›</span>
    <span id="breadcrumbMuni">Ayuntamiento</span>
    <span class="separator">›</span>
    <span class="current" id="breadcrumbTitle">Detalle de alerta</span>
  </nav>

  <!-- Main -->
  <main class="container" id="mainContent">
    <div class="loading-detail">
      <i class="fas fa-spinner fa-spin"></i>
      Cargando detalle de la alerta...
    </div>
  </main>

  <script type="module" src="/js/incident-detail.js"></script>
</body>
</html>
